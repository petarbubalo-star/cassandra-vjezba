services:
  cassandra:
    image: cassandra:5
    ports:
      - "9042:9042"   # CQL native transport (cqlsh i driveri)
    environment:
      CASSANDRA_CLUSTER_NAME: VjezbaCluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cass_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  cass_data:
